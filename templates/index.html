<!DOCTYPE html>
<html>
<head>
    <title>Network Mapper</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet">
    <style>
        #network {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
        }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🌐 Network Map</h1>
    <button onclick="scanNetwork()">🔍 Scan Again</button>
    <div id="network"></div>

    <script>
        function scanNetwork() {
            fetch('/api/devices')
                .then(response => response.json())
                .then(devices => {
                    drawGraph(devices);
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to scan network. Make sure Nmap is installed.');
                });
        }

        function drawGraph(devices) {
            var nodes = new vis.DataSet();
            var edges = new vis.DataSet();

            nodes.add({
                id: 1,
                label: 'Router',
                shape: 'box',
                color: '#FF6B6B',
                font: { size: 16, color: 'white' }
            });

            if (devices.length === 0) {
                nodes.add({
                    id: 2,
                    label: 'No devices found',
                    shape: 'dot',
                    color: '#cccccc'
                });
            }

            devices.forEach((device, index) => {
                var nodeId = index + 2;
                var label = device.hostname || device.ip;
                nodes.add({
                    id: nodeId,
                    label: label,
                    title: 'IP: ' + device.ip + '\nStatus: ' + device.status,
                    shape: 'dot',
                    size: 25,
                    color: '#4ECDC4'
                });

                edges.add({
                    from: 1,
                    to: nodeId,
                    color: '#95a5a6'
                });
            });

            var container = document.getElementById('network');
            var data = { nodes: nodes, edges: edges };
            var options = {
                layout: {
                    hierarchical: {
                        direction: 'UD',
                        sortMethod: 'directed'
                    }
                },
                physics: {
                    enabled: true,
                    stabilization: { iterations: 100 }
                }
            };
            new vis.Network(container, data, options);
        }

        scanNetwork();
    </script>
</body>
</html>
